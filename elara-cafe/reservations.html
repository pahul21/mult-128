<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elara Café | Reservations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav sticky-top">
    <div class="container">
      <a class="navbar-brand brand-name" href="index.html">Elara Café</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservations.html">Reservations</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-banner text-center">
    <div class="container">
      <h1 class="animate__animated animate__fadeInUp">Reservations</h1>
      <p>Reserve a table and enjoy a calm café experience.</p>
    </div>
  </section>

  <section class="section-space bg-cream">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <form class="contact-form shadow-sm p-4">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="res-name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="res-name" required>
              </div>
              <div class="col-md-6">
                <label for="res-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="res-email" required>
              </div>
              <div class="col-md-6">
                <label for="res-date" class="form-label">Date</label>
                <input type="date" class="form-control" id="res-date" required>
              </div>
              <div class="col-md-6">
                <label for="res-time" class="form-label">Time</label>
                <input type="time" class="form-control" id="res-time" required>
              </div>
              <div class="col-md-6">
                <label for="guests" class="form-label">Number of Guests</label>
                <select class="form-select" id="guests">
                  <option>1</option>
                  <option>2</option>
                  <option>3</option>
                  <option>4</option>
                  <option>5+</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="seating" class="form-label">Seating Preference</label>
                <select class="form-select" id="seating">
                  <option>Indoor</option>
                  <option>Window Seat</option>
                  <option>Patio</option>
                </select>
              </div>
              <div class="col-12">
                <label for="notes" class="form-label">Special Requests</label>
                <textarea class="form-control" id="notes" rows="4"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-gold">Submit Reservation</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer text-center py-4">
    <div class="container">
      <p class="mb-1">Elara Café</p>
      <p class="mb-0">Crafted with simplicity and elegance.</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
